{% extends "base.html" %}

{% block title %}Analytics - Admin{% endblock %}

{% block content %}
<div class="container-fluid mt-5 pt-4">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="display-5 fw-bold">
                <i class="fas fa-chart-line text-primary me-2"></i>Analytics Dashboard
            </h1>
        </div>
    </div>

    <div class="row g-4">
        <!-- Monthly Revenue Chart -->
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-chart-bar me-2"></i>Monthly Revenue</h5>
                </div>
                <div class="card-body">
                    <canvas id="revenueChart" height="250"></canvas>
                </div>
            </div>
        </div>

        <!-- Events by Category Chart -->
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-chart-pie me-2"></i>Events by Category</h5>
                </div>
                <div class="card-body">
                    <canvas id="categoryChart" height="250"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// Monthly Revenue Chart
const revenueCtx = document.getElementById('revenueChart').getContext('2d');
const revenueData = {
    labels: [{% for item in monthly_revenue %}'{{ item.month }}',{% endfor %}],
    datasets: [{
        label: 'Revenue (UGX)',
        data: [{% for item in monthly_revenue %}{{ item.total }},{% endfor %}],
        backgroundColor: '#F39C12',
        borderColor: '#E67E22',
        borderWidth: 2,
        fill: true
    }]
};

new Chart(revenueCtx, {
    type: 'line',
    data: revenueData,
    options: {
        responsive: true,
        plugins: {
            legend: {
                position: 'top',
            },
            tooltip: {
                callbacks: {
                    label: function(context) {
                        return 'UGX ' + context.raw.toLocaleString();
                    }
                }
            }
        },
        scales: {
            y: {
                beginAtZero: true,
                ticks: {
                    callback: function(value) {
                        return 'UGX ' + value.toLocaleString();
                    }
                }
            }
        }
    }
});

// Events by Category Chart
const categoryCtx = document.getElementById('categoryChart').getContext('2d');
const categoryLabels = [{% for item in events_by_category %}'{{ categories[item.category].name if item.category in categories else item.category }}',{% endfor %}];
const categoryData = [{% for item in events_by_category %}{{ item.count }},{% endfor %}];

new Chart(categoryCtx, {
    type: 'pie',
    data: {
        labels: categoryLabels,
        datasets: [{
            data: categoryData,
            backgroundColor: ['#F39C12', '#E67E22', '#D35400', '#F5B041', '#FAD7A0', '#F9E79F'],
            borderWidth: 1
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                position: 'bottom'
            }
        }
    }
});
</script>
{% endblock %}
